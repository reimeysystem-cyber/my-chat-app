<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub | ReimeiSystems Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 管理者用設定
        // ==========================================
        const ADMIN_PASSWORD = "reimei_secret_admin"; 
        
        let db, auth, currentUser;
        let currentRoom = 'public';
        let unsubscribeMessages = null;
        let isAdmin = false;
        const appId = 'my-github-chat-v2';

        // UI要素
        const setupOverlay = document.getElementById('setup-overlay');
        const setupForm = document.getElementById('setup-form');
        const mainContent = document.getElementById('main-content');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const nameInput = document.getElementById('name-input');
        const roomInput = document.getElementById('room-input');
        const roomDisplay = document.getElementById('current-room-name');
        const messagesList = document.getElementById('messages-list');
        const loadingOverlay = document.getElementById('loading-overlay');
        const adminOverlay = document.getElementById('admin-overlay');

        function loadConfig() {
            const savedConfig = localStorage.getItem('fb_config_secure');
            if (savedConfig) {
                try {
                    initFirebase(JSON.parse(savedConfig));
                } catch (e) {
                    localStorage.removeItem('fb_config_secure');
                    showSetup();
                }
            } else {
                showSetup();
            }
        }

        function showSetup() {
            setupOverlay.classList.remove('hidden');
            loadingOverlay.classList.add('hidden');
        }

        async function initFirebase(config) {
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        setupOverlay.classList.add('hidden');
                        mainContent.classList.remove('opacity-0', 'pointer-events-none');
                        loadingOverlay.classList.add('hidden');
                        initBoard();
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                localStorage.removeItem('fb_config_secure');
                location.reload();
            }
        }

        setupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const config = {
                apiKey: document.getElementById('api-key').value.trim(),
                authDomain: document.getElementById('auth-domain').value.trim(),
                projectId: document.getElementById('project-id').value.trim(),
                storageBucket: document.getElementById('storage-bucket').value.trim(),
                messagingSenderId: document.getElementById('sender-id').value.trim(),
                appId: document.getElementById('app-id-fb').value.trim()
            };
            localStorage.setItem('fb_config_secure', JSON.stringify(config));
            loadingOverlay.classList.remove('hidden');
            initFirebase(config);
        });

        function initBoard() {
            if (!currentUser || !db) return;
            if (unsubscribeMessages) unsubscribeMessages();

            const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', colName));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messages = [];
                snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                messages.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderMessages(messages);
            }, (error) => console.error("Firebase Error:", error));
        }

        function renderMessages(messages) {
            messagesList.innerHTML = messages.map(msg => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-3 animate-in fade-in slide-in-from-bottom-2">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-slate-700 text-sm">${escapeHtml(msg.userName || '名無しさん')}</span>
                            ${isAdmin ? `<button onclick="window.deleteMessage('${msg.id}')" class="text-[10px] bg-red-50 text-red-400 px-2 py-1 rounded-lg border border-red-100 hover:bg-red-500 hover:text-white transition-all font-bold">削除</button>` : ''}
                        </div>
                        <span class="text-[10px] text-slate-400 font-medium">${msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '送信中'}</span>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed">${escapeHtml(msg.text)}</p>
                </div>
            `).join('');
            if (messages.length === 0) {
                messagesList.innerHTML = `<div class="text-center py-20"><p class="text-slate-300 text-sm italic">まだメッセージがありません</p></div>`;
            }
        }

        // グローバル関数として登録
        window.deleteMessage = async (msgId) => {
            if (!isAdmin) {
                alert("管理者としてログインしてください。");
                return;
            }
            if (!confirm("このメッセージを削除しますか？")) return;
            
            try {
                const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', colName, msgId);
                await deleteDoc(docRef);
            } catch (err) {
                console.error("Delete failed:", err);
                alert("削除に失敗しました。Firebaseのセキュリティルール（削除権限）を確認してください。");
            }
        };

        window.clearAllMessages = async () => {
            if (!isAdmin) return;
            if (!confirm("現在のルームの全メッセージを消去しますか？")) return;
            try {
                const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', colName));
                const snapshot = await getDocs(q);
                const deletePromises = snapshot.docs.map(d => deleteDoc(d.ref));
                await Promise.all(deletePromises);
                alert("清掃完了しました。");
            } catch (err) {
                alert("全削除に失敗しました。");
            }
        };

        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            messageInput.disabled = true;
            try {
                const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', colName), {
                    text,
                    userName: nameInput.value.trim() || '名無しさん',
                    userId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
                messageInput.value = '';
                messageInput.focus();
            } finally {
                messageInput.disabled = false;
            }
        });

        document.getElementById('set-room-btn').addEventListener('click', () => {
            currentRoom = roomInput.value.trim() || 'public';
            roomDisplay.textContent = currentRoom === 'public' ? '🏠 全体掲示板' : `🔑 ルーム: ${currentRoom}`;
            initBoard();
        });

        document.getElementById('admin-login-btn').addEventListener('click', () => {
            adminOverlay.classList.remove('hidden');
        });
        document.getElementById('close-admin-btn').addEventListener('click', () => {
            adminOverlay.classList.add('hidden');
        });
        document.getElementById('admin-auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass-input').value;
            if (pass === ADMIN_PASSWORD) {
                isAdmin = true;
                adminOverlay.classList.add('hidden');
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                initBoard(); // ボタンを表示するために再描画
                alert("ReimeiSystems 管理者認証成功");
            } else {
                alert("パスワードが違います。");
            }
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.onload = loadConfig;
    </script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-bottom-2 { from { transform: translateY(0.5rem); } to { transform: translateY(0); } }
        .animate-in { animation-duration: 0.4s; animation-fill-mode: forwards; }
        .fade-in { animation-name: fade-in; }
        .slide-in-from-bottom-2 { animation-name: slide-in-from-bottom-2; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

    <div id="setup-overlay" class="fixed inset-0 bg-slate-900/90 z-[60] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black mb-2 text-slate-800 tracking-tight">Firebase Setup</h2>
            <form id="setup-form" class="space-y-4">
                <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">API Key</label><input id="api-key" required class="w-full px-4 py-2 bg-slate-100 rounded-xl text-sm outline-none"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Project ID</label><input id="project-id" required class="w-full px-4 py-2 bg-slate-100 rounded-xl text-sm outline-none"></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Auth Domain</label><input id="auth-domain" required class="w-full px-4 py-2 bg-slate-100 rounded-xl text-sm outline-none"></div>
                </div>
                <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Storage Bucket</label><input id="storage-bucket" required class="w-full px-4 py-2 bg-slate-100 rounded-xl text-sm outline-none"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Sender ID</label><input id="sender-id" required class="w-full px-4 py-2 bg-slate-100 rounded-xl text-sm outline-none"></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">App ID</label><input id="app-id-fb" required class="w-full px-4 py-2 bg-slate-100 rounded-xl text-sm outline-none"></div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl mt-4 shadow-lg active:scale-95 transition-all">保存して開始</button>
            </form>
            <div class="mt-6 text-center"><p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">ReimeiSystems Project</p></div>
        </div>
    </div>

    <div id="admin-overlay" class="fixed inset-0 bg-slate-900/95 z-[80] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center border-t-4 border-red-500">
            <div class="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-xl font-black mb-4 text-slate-800 uppercase tracking-tight">Admin Login</h2>
            <form id="admin-auth-form" class="space-y-4">
                <input type="password" id="admin-pass-input" placeholder="Password" class="w-full px-4 py-3 bg-slate-100 rounded-xl text-center outline-none focus:ring-2 focus:ring-red-500">
                <div class="flex gap-2">
                    <button type="button" id="close-admin-btn" class="flex-1 bg-slate-200 text-slate-600 font-bold py-3 rounded-xl">Back</button>
                    <button type="submit" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl">Login</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-50 z-[70] flex items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin h-10 w-10 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">ReimeiSystems</p>
        </div>
    </div>

    <div id="main-content" class="max-w-xl mx-auto px-4 py-12 opacity-0 pointer-events-none transition-opacity duration-700">
        <header class="mb-8 flex items-center justify-between px-2">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <h1 class="text-4xl font-black text-slate-900 tracking-tighter">ChatHub</h1>
                    <span class="bg-indigo-50 text-indigo-500 text-[10px] font-black px-2 py-0.5 rounded-md border border-indigo-100">ReimeiSystems</span>
                    <span id="admin-badge" class="bg-red-600 text-white text-[10px] font-black px-2 py-0.5 rounded-md hidden uppercase tracking-widest">Admin</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    <p id="current-room-name" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">🏠 全体掲示板</p>
                </div>
            </div>
            <button onclick="if(confirm('設定をリセットしますか？')) { localStorage.removeItem('fb_config_secure'); location.reload(); }" class="text-[10px] font-bold text-slate-300 hover:text-red-400 transition-colors py-2 px-3 rounded-lg border border-slate-200 uppercase tracking-tighter">Reset</button>
        </header>

        <div id="admin-controls" class="hidden mb-6 p-5 bg-red-50 border border-red-200 rounded-3xl animate-in fade-in slide-in-from-bottom-2">
            <h3 class="text-[10px] font-black text-red-600 uppercase mb-3 tracking-widest">Admin Control Panel</h3>
            <button onclick="window.clearAllMessages()" class="w-full bg-white border-2 border-red-200 text-red-600 text-[10px] font-black py-3 rounded-2xl hover:bg-red-600 hover:text-white transition-all uppercase tracking-widest shadow-sm">ルーム内の全メッセージを一掃</button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-2 mb-8 flex items-center gap-2 focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
            <div class="pl-4 py-2"><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div>
            <input type="password" id="room-input" placeholder="合言葉で個室に入室" class="flex-1 bg-transparent py-2 text-sm outline-none placeholder:text-slate-300">
            <button id="set-room-btn" class="bg-slate-900 text-white text-[10px] font-black px-6 py-3 rounded-2xl hover:bg-indigo-600 active:scale-95 transition-all uppercase tracking-widest">入室</button>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 mb-10 relative">
            <form id="message-form" class="space-y-4">
                <div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 transition-all">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Name</span>
                    <input type="text" id="name-input" placeholder="名無しさん" maxlength="12" class="flex-1 bg-transparent text-sm font-bold text-slate-700 outline-none">
                </div>
                <textarea id="message-input" rows="3" placeholder="メッセージを入力..." required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-indigo-50 transition-all resize-none leading-relaxed"></textarea>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-500 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    <span class="tracking-widest uppercase text-xs">送信する</span>
                </button>
            </form>
        </div>

        <div id="messages-list" class="space-y-4 pb-12"></div>

        <footer class="mt-12 mb-20 text-center space-y-4">
            <button id="admin-login-btn" class="text-[10px] font-bold text-slate-300 hover:text-red-500 uppercase tracking-widest transition-colors py-2 px-4 border border-slate-100 rounded-xl">Admin Settings</button>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] block">Powered by ReimeiSystems</p>
        </footer>
    </div>
</body>
</html>
