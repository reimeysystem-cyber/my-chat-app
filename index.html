<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub | ReimeiSystems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 状態管理
        let db, auth, currentUser;
        let currentRoom = 'public';
        let unsubscribeMessages = null;
        const appId = 'my-github-chat-v2';

        // UI要素
        const setupOverlay = document.getElementById('setup-overlay');
        const setupForm = document.getElementById('setup-form');
        const mainContent = document.getElementById('main-content');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const nameInput = document.getElementById('name-input');
        const roomInput = document.getElementById('room-input');
        const roomDisplay = document.getElementById('current-room-name');
        const messagesList = document.getElementById('messages-list');
        const loadingOverlay = document.getElementById('loading-overlay');

        // 設定の読み込み
        function loadConfig() {
            const savedConfig = localStorage.getItem('fb_config_secure');
            if (savedConfig) {
                try {
                    initFirebase(JSON.parse(savedConfig));
                } catch (e) {
                    localStorage.removeItem('fb_config_secure');
                    showSetup();
                }
            } else {
                showSetup();
            }
        }

        function showSetup() {
            setupOverlay.classList.remove('hidden');
            loadingOverlay.classList.add('hidden');
        }

        // Firebase初期化
        async function initFirebase(config) {
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        setupOverlay.classList.add('hidden');
                        mainContent.classList.remove('opacity-0', 'pointer-events-none');
                        loadingOverlay.classList.add('hidden');
                        initBoard();
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                console.error(error);
                alert("設定が正しくありません。リセットしてやり直してください。");
                localStorage.removeItem('fb_config_secure');
                location.reload();
            }
        }

        // セットアップ送信
        setupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const config = {
                apiKey: document.getElementById('api-key').value.trim(),
                authDomain: document.getElementById('auth-domain').value.trim(),
                projectId: document.getElementById('project-id').value.trim(),
                storageBucket: document.getElementById('storage-bucket').value.trim(),
                messagingSenderId: document.getElementById('sender-id').value.trim(),
                appId: document.getElementById('app-id-fb').value.trim()
            };
            localStorage.setItem('fb_config_secure', JSON.stringify(config));
            loadingOverlay.classList.remove('hidden');
            initFirebase(config);
        });

        // 掲示板初期化
        function initBoard() {
            if (!currentUser || !db) return;
            if (unsubscribeMessages) unsubscribeMessages();

            const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', colName));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messages = [];
                snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                messages.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderMessages(messages);
            }, (error) => {
                console.error(error);
            });
        }

        function renderMessages(messages) {
            messagesList.innerHTML = messages.map(msg => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-3 animate-in fade-in slide-in-from-bottom-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-slate-700 text-sm">${escapeHtml(msg.userName || '名無しさん')}</span>
                        <span class="text-[10px] text-slate-400 font-medium">${msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '送信中'}</span>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed">${escapeHtml(msg.text)}</p>
                </div>
            `).join('');
            if (messages.length === 0) {
                messagesList.innerHTML = `<div class="text-center py-20"><p class="text-slate-300 text-sm italic">まだメッセージがありません</p></div>`;
            }
        }

        // メッセージ送信
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            messageInput.disabled = true;
            try {
                const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', colName), {
                    text,
                    userName: nameInput.value.trim() || '名無しさん',
                    userId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
                messageInput.value = '';
                messageInput.focus();
            } catch (err) {
                alert("送信に失敗しました。");
            } finally {
                messageInput.disabled = false;
            }
        });

        // ルーム切り替え
        document.getElementById('set-room-btn').addEventListener('click', () => {
            currentRoom = roomInput.value.trim() || 'public';
            roomDisplay.textContent = currentRoom === 'public' ? '🏠 全体掲示板' : `🔑 ルーム: ${currentRoom}`;
            initBoard();
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.onload = loadConfig;
    </script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-bottom-2 { from { transform: translateY(0.5rem); } to { transform: translateY(0); } }
        .animate-in { animation-duration: 0.4s; animation-fill-mode: forwards; }
        .fade-in { animation-name: fade-in; }
        .slide-in-from-bottom-2 { animation-name: slide-in-from-bottom-2; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

    <!-- 設定画面 -->
    <div id="setup-overlay" class="fixed inset-0 bg-slate-900/90 z-[60] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black mb-2 text-slate-800 tracking-tight">Firebase Setup</h2>
            <p class="text-xs text-slate-500 mb-6 leading-relaxed">GitHubでの公開を安全にするため、API情報をコードに含めていません。自分のFirebase設定を入力してください。</p>
            <form id="setup-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">API Key</label>
                    <input id="api-key" placeholder="AIzaSy..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Project ID</label>
                        <input id="project-id" placeholder="my-app-..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Auth Domain</label>
                        <input id="auth-domain" placeholder="...firebaseapp.com" required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Storage Bucket</label>
                    <input id="storage-bucket" placeholder="...firebasestorage.app" required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Sender ID</label>
                        <input id="sender-id" placeholder="104530..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">App ID</label>
                        <input id="app-id-fb" placeholder="1:104530..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl mt-4 shadow-lg active:scale-95 transition-all">保存して開始</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">ReimeiSystems Project</p>
            </div>
        </div>
    </div>

    <!-- ローディング -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-50 z-[70] flex items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin h-10 w-10 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">ReimeiSystems</p>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div id="main-content" class="max-w-xl mx-auto px-4 py-12 opacity-0 pointer-events-none transition-opacity duration-700">
        <header class="mb-8 flex items-center justify-between px-2">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <h1 class="text-4xl font-black text-slate-900 tracking-tighter">ChatHub</h1>
                    <span class="bg-indigo-50 text-indigo-500 text-[10px] font-black px-2 py-0.5 rounded-md border border-indigo-100">ReimeiSystems</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    <p id="current-room-name" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">🏠 全体掲示板</p>
                </div>
            </div>
            <button onclick="if(confirm('設定をリセットしますか？')) { localStorage.removeItem('fb_config_secure'); location.reload(); }" class="text-[10px] font-bold text-slate-300 hover:text-red-400 transition-colors py-2 px-3 rounded-lg border border-slate-200 uppercase tracking-tighter">Reset</button>
        </header>

        <!-- ルーム切り替え -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-2 mb-8 flex items-center gap-2 focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
            <div class="pl-4 py-2">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <input type="password" id="room-input" placeholder="合言葉で個室に入室" class="flex-1 bg-transparent py-2 text-sm outline-none placeholder:text-slate-300">
            <button id="set-room-btn" class="bg-slate-900 text-white text-[10px] font-black px-6 py-3 rounded-2xl hover:bg-indigo-600 active:scale-95 transition-all uppercase tracking-widest">入室</button>
        </div>

        <!-- 投稿エリア -->
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 mb-10 overflow-hidden relative">
            <form id="message-form" class="space-y-4 relative z-10">
                <div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 group focus-within:bg-white focus-within:ring-2 focus-within:ring-indigo-50 transition-all">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Name</span>
                    <input type="text" id="name-input" placeholder="名無しさん" maxlength="12" class="flex-1 bg-transparent text-sm font-bold text-slate-700 outline-none">
                </div>
                <textarea id="message-input" rows="3" placeholder="メッセージを入力..." required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-indigo-50 transition-all resize-none leading-relaxed"></textarea>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-500 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
                    <span class="tracking-widest uppercase text-xs">送信する</span>
                    <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
            </form>
        </div>

        <!-- メッセージリスト -->
        <div id="messages-list" class="space-y-4 pb-12"></div>

        <!-- フッター（団体名） -->
        <footer class="mt-12 mb-20 text-center">
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Powered by ReimeiSystems</p>
        </footer>
    </div>
</body>
</html>
