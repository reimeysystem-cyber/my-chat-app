<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub | ReimeiSystems Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .message-in { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, deleteDoc, doc, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. 基本設定
        // ==========================================
        const ADMIN_PASSWORD = "reimei_secret_admin"; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-github-chat-v2';
        
        let db, auth, currentUser;
        let currentRoom = 'public';
        let isAdmin = false;
        let warnedUsers = new Set();
        let allMessages = [];
        let unsub = { msg: null, ann: null, warn: null };

        // UI要素
        const setupOverlay = document.getElementById('setup-overlay');
        const mainContent = document.getElementById('main-content');
        const loadingOverlay = document.getElementById('loading-overlay');
        const messagesList = document.getElementById('messages-list');
        const announceList = document.getElementById('announce-list');

        // ==========================================
        // 2. Firebase 初期化
        // ==========================================
        async function initFirebase(config) {
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        setupOverlay.classList.add('hidden');
                        loadingOverlay.classList.add('hidden');
                        mainContent.classList.replace('opacity-0', 'opacity-100');
                        startGlobalListeners();
                        loadBoard();
                    } else {
                        // 認証トークンのチェック
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    }
                });
            } catch (err) {
                console.error("Firebase Init Error:", err);
                localStorage.removeItem('fb_config_secure');
                location.reload();
            }
        }

        // ==========================================
        // 3. リアルタイム監視 (Listeners)
        // ==========================================
        function startGlobalListeners() {
            if (unsub.ann) unsub.ann();
            if (unsub.warn) unsub.warn();

            // お知らせの監視
            const qAnn = query(collection(db, 'artifacts', appId, 'public', 'data', 'announcements'));
            unsub.ann = onSnapshot(qAnn, (snap) => {
                const html = [];
                snap.forEach(d => {
                    const data = d.data();
                    html.push(`
                        <div class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white p-5 rounded-3xl shadow-xl mb-6 relative overflow-hidden group">
                            <div class="absolute -right-4 -top-4 opacity-10 group-hover:scale-110 transition-transform">
                                <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"></path></svg>
                            </div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-white/20 backdrop-blur-sm text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest">Notice</span>
                                <span class="text-[10px] opacity-60">${data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : ''}</span>
                            </div>
                            <p class="text-sm font-bold leading-relaxed relative z-10">${escapeHtml(data.text)}</p>
                            ${isAdmin ? `<button onclick="window.deleteAnnounce('${d.id}')" class="absolute top-4 right-4 text-white/50 hover:text-white transition-colors">✕</button>` : ''}
                        </div>
                    `);
                });
                announceList.innerHTML = html.join('');
            }, (err) => console.error("Announce Sync Error:", err));

            // 警告リストの監視
            const qWarn = query(collection(db, 'artifacts', appId, 'public', 'data', 'warned_users'));
            unsub.warn = onSnapshot(qWarn, (snap) => {
                warnedUsers = new Set();
                snap.forEach(d => warnedUsers.add(d.id));
                renderMessages();
            });
        }

        function loadBoard() {
            if (unsub.msg) unsub.msg();
            const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', colName));
            
            unsub.msg = onSnapshot(q, (snap) => {
                allMessages = [];
                snap.forEach(d => allMessages.push({ id: d.id, ...d.data() }));
                allMessages.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderMessages();
            });
        }

        // ==========================================
        // 4. 表示描画 (Render)
        // ==========================================
        function renderMessages() {
            if (allMessages.length === 0) {
                messagesList.innerHTML = `<div class="text-center py-20 opacity-30 italic text-sm">メッセージはまだありません</div>`;
                return;
            }

            messagesList.innerHTML = allMessages.map(msg => {
                const isWarned = warnedUsers.has(msg.userId);
                return `
                <div class="message-in bg-white p-5 rounded-[2rem] shadow-sm border ${isWarned ? 'border-amber-300 bg-amber-50/20' : 'border-slate-100'} mb-4 transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex flex-wrap items-center gap-2">
                            <span class="font-black text-slate-800 text-sm">${escapeHtml(msg.userName || '名無しさん')}</span>
                            ${isWarned ? `<span class="bg-amber-100 text-amber-600 text-[9px] font-black px-2 py-0.5 rounded-full border border-amber-200">⚠️ 警告あり</span>` : ''}
                            <span class="text-[9px] font-mono text-slate-300">ID:${msg.userId ? msg.userId.substring(0,6) : '????'}</span>
                        </div>
                        <span class="text-[10px] font-medium text-slate-400">${msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...'}</span>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed break-words">${escapeHtml(msg.text)}</p>
                    
                    ${isAdmin ? `
                        <div class="mt-4 pt-3 border-t border-slate-50 flex gap-3">
                            <button onclick="window.deleteMessage('${msg.id}')" class="text-[10px] font-bold text-red-400 hover:text-red-600 transition-colors uppercase">Delete</button>
                            <button onclick="window.toggleWarn('${msg.userId}', ${!isWarned})" class="text-[10px] font-bold text-amber-500 hover:text-amber-700 transition-colors uppercase">${isWarned ? 'Unwarn' : 'Warn User'}</button>
                        </div>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        // ==========================================
        // 5. アクション関数 (Global functions)
        // ==========================================
        window.deleteMessage = async (id) => {
            if (!isAdmin || !confirm("メッセージを消去しますか？")) return;
            const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id));
        };

        window.toggleWarn = async (uid, shouldWarn) => {
            if (!isAdmin) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'warned_users', uid);
            shouldWarn ? await setDoc(ref, { warned: true, timestamp: serverTimestamp() }) : await deleteDoc(ref);
        };

        window.postAnnounce = async () => {
            const input = document.getElementById('announce-input');
            if (!isAdmin || !input.value.trim()) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'announcements'), {
                text: input.value.trim(),
                createdAt: serverTimestamp()
            });
            input.value = '';
        };

        window.deleteAnnounce = async (id) => {
            if (!isAdmin) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'announcements', id));
        };

        window.switchRoom = () => {
            const pass = document.getElementById('room-pass').value.trim();
            currentRoom = pass || 'public';
            document.getElementById('room-label').textContent = currentRoom === 'public' ? '🏠 全体掲示板' : `🔑 ルーム: ${currentRoom}`;
            loadBoard();
            alert(`ルーム [${currentRoom}] に切り替えました`);
        };

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==========================================
        // 6. イベント処理
        // ==========================================
        window.onload = () => {
            const saved = localStorage.getItem('fb_config_secure');
            if (saved) initFirebase(JSON.parse(saved));
            else {
                setupOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('hidden');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Firebase設定保存
            document.getElementById('setup-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const config = {
                    apiKey: document.getElementById('api-key').value,
                    authDomain: document.getElementById('auth-domain').value,
                    projectId: document.getElementById('project-id').value,
                    storageBucket: document.getElementById('storage-bucket').value,
                    messagingSenderId: document.getElementById('sender-id').value,
                    appId: document.getElementById('app-id-fb').value
                };
                localStorage.setItem('fb_config_secure', JSON.stringify(config));
                loadingOverlay.classList.remove('hidden');
                initFirebase(config);
            });

            // メッセージ送信
            document.getElementById('message-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('message-input');
                const btn = e.target.querySelector('button');
                if (!input.value.trim()) return;

                btn.disabled = true;
                btn.opacity = 0.5;
                try {
                    const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', colName), {
                        text: input.value,
                        userName: document.getElementById('name-input').value || '名無しさん',
                        userId: currentUser.uid,
                        createdAt: serverTimestamp()
                    });
                    input.value = '';
                } finally {
                    btn.disabled = false;
                    btn.opacity = 1;
                }
            });

            // 管理者ログイン
            document.getElementById('admin-trigger').addEventListener('click', () => {
                const p = prompt("管理者パスワードを入力してください");
                if (p === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
                    renderMessages();
                    startGlobalListeners();
                    alert("管理者モードが有効になりました。");
                }
            });
        });
    </script>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900 selection:bg-indigo-100">

    <!-- 設定画面 -->
    <div id="setup-overlay" class="fixed inset-0 bg-slate-900/95 z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-md shadow-2xl">
            <div class="mb-8">
                <h2 class="text-3xl font-black tracking-tighter mb-2 text-slate-800 text-center">Firebase Setup</h2>
                <p class="text-slate-400 text-xs font-bold text-center uppercase tracking-widest">Connect to your system</p>
            </div>
            <form id="setup-form" class="space-y-3">
                <div class="grid grid-cols-1 gap-3">
                    <input id="api-key" placeholder="API Key" required class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-50 outline-none transition-all">
                    <div class="flex gap-3">
                        <input id="project-id" placeholder="Project ID" required class="flex-1 px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none">
                        <input id="app-id-fb" placeholder="App ID" required class="flex-1 px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none">
                    </div>
                    <input id="auth-domain" placeholder="Auth Domain" required class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none">
                    <input id="storage-bucket" placeholder="Storage Bucket" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none">
                    <input id="sender-id" placeholder="Sender ID" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] shadow-xl hover:bg-indigo-600 active:scale-95 transition-all mt-4 text-sm uppercase tracking-widest">保存して開始</button>
            </form>
        </div>
    </div>

    <!-- ローディング -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[90] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Syncing Data</p>
    </div>

    <!-- メインコンテンツ -->
    <div id="main-content" class="max-w-2xl mx-auto px-6 py-12 opacity-0 transition-opacity duration-1000">
        
        <header class="mb-10 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-5xl font-black tracking-tighter text-slate-900">ChatHub</h1>
                    <span id="admin-badge" class="admin-only hidden bg-red-500 text-white text-[9px] font-black px-2 py-0.5 rounded tracking-widest animate-pulse uppercase">Admin</span>
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <p id="room-label" class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">🏠 全体掲示板</p>
                </div>
            </div>
            <button onclick="if(confirm('設定をリセットしますか？')) { localStorage.removeItem('fb_config_secure'); location.reload(); }" class="text-[10px] font-bold text-slate-300 border border-slate-200 px-4 py-2 rounded-full hover:border-red-200 hover:text-red-400 transition-all uppercase tracking-tighter">Reset Config</button>
        </header>

        <!-- お知らせ -->
        <div id="announce-list" class="empty:hidden"></div>

        <!-- 管理者ツール -->
        <div id="admin-tools" class="admin-only hidden mb-8 p-6 bg-red-50 border border-red-200 border-dashed rounded-[2.5rem] animate-in fade-in">
            <h3 class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                Management Console
            </h3>
            <div class="flex gap-3">
                <input id="announce-input" placeholder="重要なお知らせをここに記入..." class="flex-1 px-5 py-3 bg-white rounded-2xl text-sm border border-red-100 outline-none focus:ring-2 focus:ring-red-100 transition-all">
                <button onclick="window.postAnnounce()" class="bg-red-600 text-white text-[10px] font-black px-6 rounded-2xl uppercase tracking-widest shadow-lg shadow-red-100">投稿</button>
            </div>
        </div>

        <!-- ルーム切替 -->
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-2 mb-10 flex gap-2">
            <div class="flex items-center px-4 text-slate-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <input type="password" id="room-pass" placeholder="合言葉で個室に入室..." class="flex-1 bg-transparent px-2 text-sm outline-none placeholder:text-slate-300">
            <button onclick="window.switchRoom()" class="bg-slate-900 text-white text-[10px] font-black px-6 py-3 rounded-[1.5rem] hover:bg-indigo-600 transition-all uppercase tracking-widest">移動</button>
        </div>

        <!-- メッセージ投稿 -->
        <div class="bg-white rounded-[3rem] shadow-xl shadow-slate-200/50 border border-slate-100 p-8 mb-12 relative overflow-hidden">
            <form id="message-form" class="space-y-4">
                <div class="flex items-center gap-3 bg-slate-50 rounded-2xl px-4 py-2 border border-slate-100">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Name</span>
                    <input type="text" id="name-input" placeholder="名無しさん" maxlength="12" class="bg-transparent flex-1 text-sm font-bold text-slate-700 outline-none">
                </div>
                <textarea id="message-input" rows="3" placeholder="何かメッセージを残しましょう..." required class="w-full bg-slate-50 rounded-3xl px-6 py-5 text-sm outline-none focus:bg-white border border-slate-50 focus:border-indigo-100 transition-all resize-none leading-relaxed"></textarea>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-indigo-100 hover:bg-indigo-500 active:scale-[0.98] transition-all text-xs uppercase tracking-widest">送信する</button>
            </form>
        </div>

        <!-- メッセージリスト -->
        <div id="messages-list" class="space-y-6"></div>

        <footer class="mt-24 pb-12 text-center flex flex-col items-center gap-6">
            <button id="admin-trigger" class="text-[9px] font-black text-slate-300 hover:text-red-500 uppercase tracking-[0.4em] transition-colors py-3 px-6 rounded-full border border-slate-100 hover:border-red-100 hover:bg-red-50/30">
                Admin Settings
            </button>
            <div class="h-px w-8 bg-slate-200"></div>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">ReimeiSystems Premium</p>
        </footer>
    </div>
</body>
</html>
