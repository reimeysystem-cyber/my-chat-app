<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe & Fun ChatHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // State management
        let db, auth, currentUser;
        let currentRoom = 'public';
        let unsubscribeMessages = null;
        const appId = 'my-github-chat-v2';

        // UI Elements
        const setupOverlay = document.getElementById('setup-overlay');
        const setupForm = document.getElementById('setup-form');
        const mainContent = document.getElementById('main-content');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const nameInput = document.getElementById('name-input');
        const roomInput = document.getElementById('room-input');
        const roomDisplay = document.getElementById('current-room-name');
        const messagesList = document.getElementById('messages-list');
        const loadingOverlay = document.getElementById('loading-overlay');

        /**
         * Load configuration from LocalStorage
         */
        function loadConfig() {
            const savedConfig = localStorage.getItem('fb_config_secure');
            if (savedConfig) {
                try {
                    initFirebase(JSON.parse(savedConfig));
                } catch (e) {
                    localStorage.removeItem('fb_config_secure');
                    setupOverlay.classList.remove('hidden');
                    loadingOverlay.classList.add('hidden');
                }
            } else {
                setupOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('hidden');
            }
        }

        /**
         * Initialize Firebase
         */
        async function initFirebase(config) {
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        setupOverlay.classList.add('hidden');
                        mainContent.classList.remove('opacity-20', 'pointer-events-none');
                        loadingOverlay.classList.add('hidden');
                        initBoard();
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                console.error(error);
                alert("Firebaseの設定が正しくありません。入力をやり直してください。");
                localStorage.removeItem('fb_config_secure');
                location.reload();
            }
        }

        // Setup form submission
        setupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const config = {
                apiKey: document.getElementById('api-key').value.trim(),
                authDomain: document.getElementById('auth-domain').value.trim(),
                projectId: document.getElementById('project-id').value.trim(),
                storageBucket: document.getElementById('storage-bucket').value.trim(),
                messagingSenderId: document.getElementById('sender-id').value.trim(),
                appId: document.getElementById('app-id-fb').value.trim()
            };
            localStorage.setItem('fb_config_secure', JSON.stringify(config));
            loadingOverlay.classList.remove('hidden');
            initFirebase(config);
        });

        // Initialize Chat Board
        function initBoard() {
            if (!currentUser || !db) return;
            if (unsubscribeMessages) unsubscribeMessages();

            const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', colName));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messages = [];
                snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                messages.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderMessages(messages);
            }, (error) => {
                console.error(error);
                if (error.code === 'permission-denied') {
                    alert("アクセスが拒否されました。Firebaseのセキュリティルールを確認してください。");
                }
            });
        }

        function renderMessages(messages) {
            messagesList.innerHTML = messages.map(msg => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-3 animate-in fade-in slide-in-from-bottom-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-slate-700 text-sm">${escapeHtml(msg.userName || '名無しさん')}</span>
                        <span class="text-[10px] text-slate-400">${msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '送信中'}</span>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed">${escapeHtml(msg.text)}</p>
                </div>
            `).join('');
            if (messages.length === 0) {
                messagesList.innerHTML = `<p class="text-center text-slate-300 py-10 text-sm">まだメッセージがありません</p>`;
            }
        }

        // Send Message
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            messageInput.disabled = true;
            try {
                const colName = currentRoom === 'public' ? 'messages' : `room_${currentRoom}`;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', colName), {
                    text,
                    userName: nameInput.value.trim() || '名無しさん',
                    userId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
                messageInput.value = '';
                messageInput.focus();
            } catch (err) {
                alert("送信に失敗しました。");
            } finally {
                messageInput.disabled = false;
            }
        });

        // Switch Room
        document.getElementById('set-room-btn').addEventListener('click', () => {
            currentRoom = roomInput.value.trim() || 'public';
            roomDisplay.textContent = currentRoom === 'public' ? '🏠 全体掲示板' : `🔑 ルーム: ${currentRoom}`;
            initBoard();
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.onload = loadConfig;
    </script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-bottom-2 { from { transform: translateY(0.5rem); } to { transform: translateY(0); } }
        .animate-in { animation-duration: 0.4s; animation-fill-mode: forwards; }
        .fade-in { animation-name: fade-in; }
        .slide-in-from-bottom-2 { animation-name: slide-in-from-bottom-2; }
    </style>
</head>
<body class="bg-[#F1F5F9] min-h-screen font-sans">

    <!-- Setup Overlay -->
    <div id="setup-overlay" class="fixed inset-0 bg-slate-900/95 z-[60] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black mb-2 text-slate-800 tracking-tight">Firebase Setup</h2>
            <p class="text-xs text-slate-500 mb-6 leading-relaxed">GitHubでの公開を安全にするため、API情報をコードに含めていません。自分のFirebase設定を入力してください。この情報はあなたのブラウザにのみ保存されます。</p>
            <form id="setup-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">API Key</label>
                    <input id="api-key" placeholder="AIzaSy..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Project ID</label>
                        <input id="project-id" placeholder="my-app-..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Auth Domain</label>
                        <input id="auth-domain" placeholder="...firebaseapp.com" required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Storage Bucket</label>
                    <input id="storage-bucket" placeholder="...firebasestorage.app" required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Sender ID</label>
                        <input id="sender-id" placeholder="104530..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">App ID</label>
                        <input id="app-id-fb" placeholder="1:104530..." required class="w-full px-4 py-2.5 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl mt-4 shadow-lg active:scale-95 transition-all">保存して開始</button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[70] flex items-center justify-center">
        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="max-w-xl mx-auto px-4 py-8 opacity-20 pointer-events-none transition-opacity duration-500">
        <header class="mb-6 px-2 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter">ChatHub</h1>
                <p id="current-room-name" class="text-xs font-bold text-indigo-500 uppercase tracking-widest">🏠 全体掲示板</p>
            </div>
            <button onclick="if(confirm('設定をリセットしますか？')) { localStorage.removeItem('fb_config_secure'); location.reload(); }" class="text-[10px] text-slate-400 hover:text-red-500 font-bold uppercase tracking-tighter">Reset Settings</button>
        </header>

        <!-- Room Change -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-2 mb-6 flex items-center gap-2">
            <input type="password" id="room-input" placeholder="合言葉で個室に入室" class="flex-1 bg-transparent px-4 py-2 text-sm focus:outline-none">
            <button id="set-room-btn" class="bg-slate-900 text-white text-xs font-black px-5 py-2.5 rounded-2xl hover:bg-indigo-600 transition-all">入室</button>
        </div>

        <!-- Post Form -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-8">
            <form id="message-form" class="space-y-4">
                <input type="text" id="name-input" placeholder="お名前" maxlength="12" class="w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                <textarea id="message-input" rows="3" placeholder="メッセージを入力..." required class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-500 transition-all">送信する</button>
            </form>
        </div>

        <!-- Messages -->
        <div id="messages-list" class="space-y-3 pb-20"></div>
    </div>
</body>
</html>
